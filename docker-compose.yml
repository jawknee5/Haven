services:
  # ── Nginx reverse proxy (HTTP/HTTPS, routes / → frontend, /api/ → backend) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: haven-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro          # Let's Encrypt certs land here
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - haven-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── React + Vite frontend (multi-stage build → nginx static) ──────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: haven-frontend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - haven-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: haven-backend
    expose:
      - "8000"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - DATABASE_NAME=${DATABASE_NAME:-haven}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-90}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY:-}       # leave blank to disable Sonnet charges
      - CORS_ORIGINS=${CORS_ORIGINS:-https://homeishaven.cloud,https://www.homeishaven.cloud}
      - JWT_SECRET=${JWT_SECRET:-change_me_run_openssl_rand_hex_32}
      - ENVIRONMENT=production
    depends_on:
      mongo:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - haven-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: haven-mongo
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=haven
    restart: unless-stopped
    networks:
      - haven-net
    volumes:
      - mongo-data:/data/db
    command: mongod --wiredTigerCacheSizeGB 1
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Ollama (local LLM — free, no API credits) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: haven-ollama
    expose:
      - "11434"
    environment:
      - OLLAMA_NUM_GPU=0       # set to 1 if your VPS/host has a GPU
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped
    networks:
      - haven-net
    volumes:
      - ollama-models:/root/.ollama/models
    # Pulls the model on first start (~2 GB, takes a few minutes)
    entrypoint: >
      sh -c "ollama serve &
             sleep 8 &&
             ollama pull ${OLLAMA_MODEL:-llama3.2:3b};
             wait"

networks:
  haven-net:
    driver: bridge

volumes:
  mongo-data:
  ollama-models:
