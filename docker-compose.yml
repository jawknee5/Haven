services:
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    container_name: pathway-frontend
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend
    networks:
      - pathway_net
    labels:
      - "com.pathway.service=frontend"
      - "com.pathway.version=4.0"
      - "com.pathway.creator=Johnathan R. Rodriquez"
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pathway-backend
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=pathway-backend
      - PLATFORM_VERSION=4.0
      - JWT_SECRET=${JWT_SECRET:-xortron_supreme_super_secret_key_2026}
      - VAULT_KEY=${VAULT_KEY:-change_me_in_production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-change_me_in_production}

    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - pathway_net
    labels:
      - "com.pathway.service=backend"
      - "com.pathway.version=4.0"
      - "com.pathway.creator=Johnathan R. Rodriquez"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"

  db:
    image: postgres:15-alpine
    container_name: pathway-db
    restart: always
    environment:
      - POSTGRES_USER=pathway_prod
      - POSTGRES_PASSWORD=PathwaySecure2026
      - POSTGRES_DB=pathway_prod
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pathway_net
    labels:
      - "com.pathway.service=database"
      - "com.pathway.version=4.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathway_prod -d pathway_prod"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"

  prometheus:
    image: prom/prometheus:latest
    container_name: pathway-prometheus
    restart: always
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pathway_net
    labels:
      - "com.pathway.service=monitoring"
      - "com.pathway.version=4.0"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: pathway-grafana
    restart: always
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=PathwayAnalytics202
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - pathway_net
    labels:
      - "com.pathway.service=analytics"
      - "com.pathway.version=4.0"

networks:
  pathway_net:
    driver: bridge
    name: pathway_network

volumes:
  pgdata:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
