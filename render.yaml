services:
  - type: web
    name: haven-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "8000"
      - key: NODE_ENV
        value: production

databases:
  - name: haven-db
    plan: free
