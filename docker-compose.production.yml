version: '3.9'

services:
  pathway-frontend:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.pathway-genesis.com}
    container_name: pathway-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL:-https://api.pathway-genesis.com}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - pathway-network
    labels:
      - "com.pathway.service=frontend"
      - "com.pathway.environment=production"

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: pathway-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - pathway-frontend
    networks:
      - pathway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  pathway-network:
    driver: bridge

volumes:
  nginx-cache:
    driver: local
