    <title>PATHWAY v4 - Civic Technology Platform</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0f1729;
        color: #e2e8f0;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }

      /* Animated Intro Styles */
      .intro-container {
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, #0f1729 0%, #0a1628 50%, #051421 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
      }

      .intro-bg-elements {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .intro-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
      }

      .intro-blob-1 {
        width: 400px;
        height: 400px;
        background: #3b82f6;
        top: 10%;
        left: 20%;
        animation: float 8s ease-in-out infinite;
      }

      .intro-blob-2 {
        width: 300px;
        height: 300px;
        background: #14b8a6;
        bottom: 10%;
        right: 15%;
        animation: float 10s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(30px); }
      }

      @keyframes fadeInScale {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .intro-content {
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 600px;
        padding: 40px;
      }

      .intro-logo {
        font-size: 80px;
        margin-bottom: 20px;
        animation: fadeInScale 1.2s ease-out;
      }

      .intro-title {
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #3b82f6 0%, #14b8a6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
        animation: fadeInUp 1.2s ease-out 0.3s both;
      }

      .intro-subtitle {
        font-size: 20px;
        color: #94a3b8;
        margin-bottom: 30px;
        animation: fadeInUp 1.2s ease-out 0.6s both;
      }

      .intro-description {
        font-size: 16px;
        color: #cbd5e1;
        line-height: 1.6;
        margin-bottom: 40px;
        animation: fadeInUp 1.2s ease-out 0.9s both;
      }

      .intro-features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 40px;
      }

      .intro-feature {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 20px;
        animation: fadeInUp 1.2s ease-out 1.2s both;
      }

      .intro-feature:nth-child(2) {
        animation-delay: 1.4s;
      }

      .intro-feature:nth-child(3) {
        animation-delay: 1.6s;
      }

      .intro-feature-icon {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .intro-feature-text {
        font-size: 14px;
        color: #cbd5e1;
      }

      .intro-loader {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 20px;
        animation: fadeInUp 1.2s ease-out 1.8s both;
      }

      .intro-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #3b82f6;
        animation: pulse 1.5s ease-in-out infinite;
      }

      .intro-dot:nth-child(2) {
        animation-delay: 0.2s;
        background: #14b8a6;
      }

      .intro-dot:nth-child(3) {
        animation-delay: 0.4s;
        background: #3b82f6;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      .intro-status {
        font-size: 14px;
        color: #64748b;
        animation: fadeInUp 1.2s ease-out 2s both;
      }

      .intro-version {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 12px;
        color: #475569;
      }

      .intro-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: linear-gradient(90deg, #3b82f6 0%, #14b8a6 100%);
        animation: progressBar 4s ease-in-out forwards;
      }

      @keyframes progressBar {
        from { width: 0%; }
        to { width: 100%; }
      }

      @media (max-width: 768px) {
        .intro-title {
          font-size: 36px;
        }
        .intro-subtitle {
          font-size: 16px;
        }
        .intro-features {
          grid-template-columns: 1fr;
        }
      }
    </style>
