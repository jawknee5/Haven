worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstream services ────────────────────────────────────────────────────
    upstream haven-frontend {
        server frontend:3000;
    }

    upstream haven-backend {
        server backend:8000;
    }

    # ── HTTP → HTTPS redirect (also handles Let's Encrypt ACME challenges) ──
    server {
        listen 80;
        server_name homeishaven.cloud www.homeishaven.cloud home-is-haven-com www.home-is-haven-com;

        # Let's Encrypt cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS on .cloud
        location / {
            return 301 https://homeishaven.cloud$request_uri;
        }
    }

    # ── HTTPS — main site ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name homeishaven.cloud www.homeishaven.cloud;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check endpoint (nginx-level, no upstream needed)
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # API → FastAPI backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://haven-backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket support (BB streaming if needed)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 120s;
        }

        # Demo housing form
        location /demo/ {
            proxy_pass         http://haven-backend;
            proxy_set_header   Host $host;
        }

        # React SPA — all other routes
        location / {
            proxy_pass         http://haven-frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://haven-frontend;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }
    }

    # ── Redirect old domain to .cloud ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name home-is-haven-com www.home-is-haven-com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        return 301 https://homeishaven.cloud$request_uri;
    }
}
